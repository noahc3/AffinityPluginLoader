site_name: Affinity Plugin Loader
site_url: https://noahc3.github.io/AffinityPluginLoader/
repo_url: https://github.com/noahc3/AffinityPluginLoader
repo_name: noahc3/AffinityPluginLoader

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list

nav:
  - Home: index.md
  - User Guide:
    - Installation: guide/installation.md
    - Configuration: guide/configuration.md
  - Developer Guide:
    - Creating a Plugin: dev/creating-a-plugin.md
  - WineFix:
    - Overview: winefix/index.md
    - Installation: winefix/installation.md
    - Configuration: winefix/configuration.md
